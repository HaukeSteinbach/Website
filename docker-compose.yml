services:
  app:
    image: ghcr.io/haukesteinbach/haukesteinbach:latest
    container_name: steinbachapp
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    env_file:
      - ./backend/.env.runtime
    volumes:
      - uploads-data:/var/lib/steinbach/uploads

volumes:
  uploads-data: